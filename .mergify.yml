queue_rules:
  - name: default
    merge_conditions:
      - status-success=test-bot (ubuntu-24.04)
      - status-success=test-bot (ubuntu-24.04-arm)
      - status-success=test-bot (macos-26-intel)
      - status-success=test-bot (macos-26)

pull_request_rules:
  - name: automatic rebase for releases
    conditions:
      - status-success=test-bot (ubuntu-24.04)
      - status-success=test-bot (ubuntu-24.04-arm)
      - status-success=test-bot (macos-26-intel)
      - status-success=test-bot (macos-26)
      - base=main
      - label=releases
      - author=tomphp
    actions:
      label:
        add:
          - pr-pull
